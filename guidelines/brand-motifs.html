<!-- @dsCard group="Brand" viewport="700x200" name="Atmosphere & motifs" subtitle="Blurred color blobs, faint grid, rotating gradient ring" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); padding: 0; overflow: hidden; font-family: var(--font-body); }
  .stage { position: relative; height: 200px; }
  .grid { position: absolute; inset: 0; background-image: var(--grid-overlay); background-size: var(--grid-size); }
  .blob { position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.20; }
  .b1 { width: 220px; height: 220px; background: var(--accent); top: -80px; left: -40px; }
  .b2 { width: 200px; height: 200px; background: var(--accent-2); bottom: -90px; left: 200px; }
  .b3 { width: 180px; height: 180px; background: var(--accent-3); top: -40px; right: -30px; }
  .ringwrap { position: absolute; right: 60px; top: 50%; transform: translateY(-50%); width: 96px; height: 96px; }
  .ring { position: absolute; inset: -10px; border-radius: 30px; background: var(--gradient); opacity: 0.4; animation: spin 6s linear infinite; }
  .ring2 { inset: -20px; opacity: 0.15; animation: spin 10s linear infinite reverse; border-radius: 38px; }
  .photo { position: absolute; inset: 0; border-radius: 22px; background: var(--bg-3); border: 1px solid var(--border); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .lab { position: absolute; left: 24px; bottom: 18px; font-family: var(--font-mono); font-size: var(--fs-xs); color: var(--text-muted); }
  @media (prefers-reduced-motion: reduce) { .ring { animation: none; } }
</style>
</head>
<body>
  <div class="stage">
    <div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>
    <div class="grid"></div>
    <div class="ringwrap"><div class="ring ring2"></div><div class="ring"></div><div class="photo"></div></div>
    <div class="lab">blur-80px blobs · 0.025 grid · rotating gradient rings</div>
  </div>
</body>
</html>
