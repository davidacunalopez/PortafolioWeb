<!-- @dsCard group="Spacing" viewport="700x160" name="Corner radii" subtitle="10px chips → 24px cards → 99px pills" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-2); color: var(--text); font-family: var(--font-body); padding: 24px; }
  .row { display: flex; gap: 20px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .box { width: 84px; height: 64px; background: var(--surface); border: 1px solid var(--border-strong); }
  .lab { font-family: var(--font-mono); font-size: 0.66rem; color: var(--text-muted); text-align: center; }
  .lab b { color: var(--text); display: block; }
  .pill { width: 120px; border-radius: var(--radius-pill); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="lab"><b>10px</b>--radius-sm</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius)"></div><span class="lab"><b>16px</b>--radius</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><span class="lab"><b>20px</b>--radius-md</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="lab"><b>24px</b>--radius-lg</span></div>
    <div class="item"><div class="box pill"></div><span class="lab"><b>99px</b>--radius-pill</span></div>
  </div>
</body>
</html>
