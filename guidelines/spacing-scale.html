<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing scale" subtitle="8px-based rhythm from 4px to 112px section padding" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-2); color: var(--text); font-family: var(--font-body); padding: 24px; }
  .row { display: flex; align-items: flex-end; gap: 18px; }
  .item { display: flex; flex-direction: column; gap: 6px; align-items: flex-start; }
  .bar { background: var(--gradient); border-radius: 4px; height: 56px; }
  .lab { font-family: var(--font-mono); font-size: 0.66rem; color: var(--text-muted); }
  .lab b { color: var(--text); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="width:8px"></div><span class="lab"><b>2</b><br>8</span></div>
    <div class="item"><div class="bar" style="width:16px"></div><span class="lab"><b>4</b><br>16</span></div>
    <div class="item"><div class="bar" style="width:24px"></div><span class="lab"><b>5</b><br>24</span></div>
    <div class="item"><div class="bar" style="width:32px"></div><span class="lab"><b>6</b><br>32</span></div>
    <div class="item"><div class="bar" style="width:48px"></div><span class="lab"><b>8</b><br>48</span></div>
    <div class="item"><div class="bar" style="width:80px"></div><span class="lab"><b>10</b><br>80</span></div>
    <div class="item"><div class="bar" style="width:112px"></div><span class="lab"><b>12</b><br>112</span></div>
  </div>
</body>
</html>
