<!-- @dsCard group="Spacing" viewport="700x180" name="Shadows & glows" subtitle="Neutral elevation shadows + the morado accent glow" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-2); color: var(--text); font-family: var(--font-body); padding: 28px 24px; }
  .row { display: flex; gap: 28px; align-items: center; }
  .item { display: flex; flex-direction: column; gap: 12px; align-items: center; }
  .box { width: 96px; height: 56px; border-radius: var(--radius); background: var(--bg-3); border: 1px solid var(--border); }
  .glow { background: var(--accent); border: none; }
  .lab { font-family: var(--font-mono); font-size: 0.64rem; color: var(--text-muted); text-align: center; }
  .lab b { color: var(--text); display: block; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="lab"><b>--shadow-sm</b>resting card</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="lab"><b>--shadow-lg</b>hover lift</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xl)"></div><span class="lab"><b>--shadow-xl</b>project hover</span></div>
    <div class="item"><div class="box glow" style="box-shadow:var(--glow-accent-strong)"></div><span class="lab"><b>--glow-accent</b>lit primary</span></div>
  </div>
</body>
</html>
