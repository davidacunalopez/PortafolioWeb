<!-- @dsCard group="Brand" viewport="700x150" name="Glyph vocabulary" subtitle="Unicode marks used in place of an icon set" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-2); color: var(--text); font-family: var(--font-body); padding: 24px; }
  .row { display: flex; gap: 16px; }
  .g { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; display: flex; flex-direction: column; gap: 8px; }
  .mark { font-size: 1.5rem; color: var(--accent); }
  .use { font-size: var(--fs-xs); color: var(--text-muted); line-height: 1.5; }
  .use b { color: var(--text); font-weight: 600; display: block; }
</style>
</head>
<body>
  <div class="row">
    <div class="g"><span class="mark">→</span><span class="use"><b>Forward CTA</b>Ver proyectos →</span></div>
    <div class="g"><span class="mark">↑</span><span class="use"><b>Back to top</b>Volver arriba</span></div>
    <div class="g"><span class="mark">·</span><span class="use"><b>Divider</b>GitHub · LinkedIn</span></div>
    <div class="g"><span class="mark" style="color:var(--accent-3)">✓</span><span class="use"><b>Success</b>Mensaje enviado</span></div>
  </div>
</body>
</html>
