<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-2); color: var(--text); font-family: var(--font-display); padding: 24px; }
  .big { font-size: 3rem; font-weight: 800; line-height: var(--lh-tight); letter-spacing: var(--ls-tight); }
  .sub { font-size: 1.6rem; font-weight: 700; line-height: var(--lh-heading); margin-top: 4px; }
  .tok { font-family: var(--font-mono); font-size: var(--fs-xs); color: var(--text-muted); margin-top: 12px; }
</style>
</head>
<body>
  <div class="big">Stack tecnológico</div>
  <div class="sub">Creando con pasión y propósito</div>
  <div class="tok">--font-display · Space Grotesk · 700 / 800 · line-height 1.05–1.15</div>
</body>
</html>
