<!-- @dsCard group="Brand" viewport="700x160" name="Wordmark" subtitle="Type-only logo — DA + morado period, Space Grotesk bold" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--font-body); padding: 24px; display: flex; align-items: center; gap: 40px; }
  .logo { font-family: var(--font-display); font-weight: 700; color: var(--text-strong); }
  .logo .accent { color: var(--accent); }
  .lg { font-size: 3rem; }
  .md { font-size: 1.4rem; }
  .note { font-family: var(--font-mono); font-size: var(--fs-xs); color: var(--text-muted); max-width: 240px; line-height: 1.7; }
</style>
</head>
<body>
  <div class="logo lg">DA<span class="accent">.</span></div>
  <div class="logo md">DA<span class="accent">.</span></div>
  <div class="note">No image logo. The period always carries --accent (#6c63ff).</div>
</body>
</html>
