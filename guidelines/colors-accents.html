<!-- @dsCard group="Colors" viewport="700x150" name="Brand accents" subtitle="Morado · rosa · cyan — the three signature accents" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-2); color: var(--text); font-family: var(--font-body); padding: 24px; }
  .row { display: flex; gap: 16px; }
  .sw { flex: 1; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
  .chip { height: 64px; }
  .meta { padding: 10px 12px; display: flex; flex-direction: column; gap: 2px; background: var(--surface); }
  .name { font-weight: 600; font-size: var(--fs-sm); }
  .hex { font-family: var(--font-mono); font-size: var(--fs-xs); color: var(--text-muted); }
  .tok { font-family: var(--font-mono); font-size: 0.68rem; color: var(--accent); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--accent)"></div><div class="meta"><span class="name">Morado</span><span class="hex">#6c63ff</span><span class="tok">--accent</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--accent-2)"></div><div class="meta"><span class="name">Rosa</span><span class="hex">#f72585</span><span class="tok">--accent-2</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--accent-3)"></div><div class="meta"><span class="name">Cyan</span><span class="hex">#4cc9f0</span><span class="tok">--accent-3</span></div></div>
  </div>
</body>
</html>
