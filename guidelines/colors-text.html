<!-- @dsCard group="Colors" viewport="700x150" name="Text colors" subtitle="Cool-tinted text ramp — never pure white or gray" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-2); font-family: var(--font-body); padding: 24px; }
  .stack { display: flex; flex-direction: column; gap: 10px; }
  .line { display: flex; align-items: baseline; gap: 14px; }
  .sample { font-size: 1.05rem; font-weight: 500; min-width: 280px; }
  .tok { font-family: var(--font-mono); font-size: var(--fs-xs); color: var(--text-muted); }
</style>
</head>
<body>
  <div class="stack">
    <div class="line"><span class="sample" style="color:var(--text-strong)">Heading — soft white</span><span class="tok">--text-strong #ffffff</span></div>
    <div class="line"><span class="sample" style="color:var(--text)">Body copy — primary text</span><span class="tok">--text #e8eaf0</span></div>
    <div class="line"><span class="sample" style="color:var(--text-muted)">Secondary / labels / captions</span><span class="tok">--text-muted #8892a4</span></div>
    <div class="line"><span class="sample" style="color:var(--text-faint)">Placeholder / disabled text</span><span class="tok">--text-faint .5</span></div>
  </div>
</body>
</html>
