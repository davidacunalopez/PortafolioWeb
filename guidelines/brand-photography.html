<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-2); padding: 20px 24px; font-family: var(--font-body); }
  .row { display: flex; gap: 14px; }
  .ph { border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border); box-shadow: var(--shadow-sm); }
  .ph img { display: block; width: 100%; height: 150px; object-fit: cover; }
  .a { flex: 1.4; } .b { flex: 1; } .c { flex: 1; }
</style>
</head>
<body>
  <div class="row">
    <div class="ph a"><img src="../assets/perfil.jpg" alt="David presentando" /></div>
    <div class="ph b"><img src="../assets/photo-1251.jpg" alt="Retrato" /></div>
    <div class="ph c"><img src="../assets/photo-1792.jpg" alt="Trabajando" /></div>
  </div>
</body>
</html>
