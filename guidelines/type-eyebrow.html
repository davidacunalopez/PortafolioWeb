<!-- @dsCard group="Type" viewport="700x160" name="Eyebrow & gradient text" subtitle="Uppercase pill label + gradient heading emphasis" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-2); color: var(--text); font-family: var(--font-body); padding: 24px; }
  .eyebrow { display: inline-block; font-size: var(--fs-label); font-weight: 600; letter-spacing: var(--ls-label); text-transform: uppercase; color: var(--accent); border: 1px solid var(--accent-border); padding: 0.3rem 0.9rem; border-radius: var(--radius-pill); background: var(--accent-soft); }
  h2 { font-family: var(--font-display); font-size: var(--fs-h1); font-weight: 700; line-height: var(--lh-heading); margin: 16px 0 0; }
  .grad { background: var(--gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .tok { font-family: var(--font-mono); font-size: var(--fs-xs); color: var(--text-muted); margin-top: 12px; }
</style>
</head>
<body>
  <span class="eyebrow">Proyectos</span>
  <h2>Trabajo <span class="grad">reciente</span></h2>
  <div class="tok">eyebrow uppercase · 0.15em · gradient-text fills emphasised half</div>
</body>
</html>
