<!-- @dsCard group="Colors" viewport="700x150" name="Canvas & surfaces" subtitle="Near-black blue-tinted canvas + translucent glass surfaces" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--font-body); padding: 24px; }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--border); }
  .chip { height: 52px; }
  .meta { padding: 8px 10px; display: flex; flex-direction: column; gap: 1px; }
  .name { font-weight: 600; font-size: var(--fs-xs); }
  .tok { font-family: var(--font-mono); font-size: 0.64rem; color: var(--text-muted); }
  .checker { background:
    repeating-conic-gradient(#1a1f2b 0% 25%, #11151f 0% 50%) 0 / 16px 16px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--bg)"></div><div class="meta"><span class="name">Canvas</span><span class="tok">--bg #080b12</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--bg-2)"></div><div class="meta"><span class="name">Raised</span><span class="tok">--bg-2 #0d1117</span></div></div>
    <div class="sw checker"><div class="chip" style="background:var(--surface)"></div><div class="meta"><span class="name">Glass</span><span class="tok">--surface .04</span></div></div>
    <div class="sw checker"><div class="chip" style="background:var(--surface-hover)"></div><div class="meta"><span class="name">Glass·hover</span><span class="tok">--surface-hover .08</span></div></div>
    <div class="sw checker"><div class="chip" style="background:var(--border)"></div><div class="meta"><span class="name">Border</span><span class="tok">--border .08</span></div></div>
  </div>
</body>
</html>
