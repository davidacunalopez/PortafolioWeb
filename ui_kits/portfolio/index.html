<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>David Acuña — Portafolio</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); line-height: var(--lh-body); }
  img { max-width: 100%; display: block; }

  .da-scroll { height: 100vh; overflow-y: auto; overflow-x: hidden; position: relative; }
  .da-scroll::-webkit-scrollbar { width: 6px; }
  .da-scroll::-webkit-scrollbar-track { background: var(--bg); }
  .da-scroll::-webkit-scrollbar-thumb { background: rgba(108,99,255,0.4); border-radius: 99px; }

  .da-blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15; animation: da-blob-move 8s ease-in-out infinite alternate; }
  @keyframes da-blob-move { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(30px,20px) scale(1.05); } }
  @keyframes da-float { 0% { transform: translateY(0); } 100% { transform: translateY(-10px); } }

  /* 3-D tilt containers: preserve depth for child transforms */
  .da-tilt { position: relative; will-change: transform; }

  /* Scroll progress bar */
  #da-progress {
    position: fixed; top: 0; left: 0; height: 3px; z-index: 9999;
    background: var(--gradient);
    box-shadow: 0 0 10px rgba(108,99,255,0.8), 0 0 20px rgba(247,37,133,0.35);
    transition: width 0.12s linear, opacity 0.3s ease;
    pointer-events: none;
  }

  @media (prefers-reduced-motion: reduce) {
    .da-blob, [style*="da-float"] { animation: none !important; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
  <div class="da-scroll"><div id="root"></div></div>
  <script type="text/babel" src="Hooks.jsx"></script>
  <script type="text/babel" src="Atmosphere.jsx"></script>
  <script type="text/babel" src="Nav.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="About.jsx"></script>
  <script type="text/babel" src="Skills.jsx"></script>
  <script type="text/babel" src="Projects.jsx"></script>
  <script type="text/babel" src="Contact.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>
  <script type="text/babel" src="App.jsx"></script>
  <script type="text/babel" data-presets="react">
    const Root = window.App;
    ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
  </script>
</body>
</html>
